services:
  frontend:
    build:
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://nginx:80

  nginx:
    ports:
      - "8080:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html:ro
    depends_on:
      - frontend
      - backend
