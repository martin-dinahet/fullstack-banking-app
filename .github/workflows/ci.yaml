name: MyBank CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install project dependencies
        run: npm ci

      - name: Run Biome lint
        run: npm run lint

      - name: Typescript type-checking
        run: npm run typecheck

  test:
    name: Vitest Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install project dependencies
        run: npm ci

      - name: Execute Vitest unit tests
        run: npm run test

  test-backend:
    name: PHPUnit Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: mybank
          MYSQL_USER: mybank
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: rootsecret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_mysql

      - name: Create .env file
        run: cp .env.test .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create test database and grant privileges
        run: |
          mysql -u root -prootsecret -h 127.0.0.1 -P 3306 -e "CREATE DATABASE IF NOT EXISTS mybank_test;"
          mysql -u root -prootsecret -h 127.0.0.1 -P 3306 -e "GRANT ALL PRIVILEGES ON mybank_test.* TO 'mybank'@'%';"

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run PHPUnit
        run: php bin/phpunit --testdox
