services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - mybank-net

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "mysql://mybank:secret@db:3306/mybank"
      APP_ENV: dev
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
    networks:
      - mybank-net

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: mybank
      MYSQL_USER: mybank
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    networks:
      - mybank-net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mybank-net

volumes:
  db-data:

networks:
  mybank-net:
    driver: bridge
